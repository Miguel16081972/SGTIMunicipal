<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SGTI Móvil</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <script type="module" crossorigin src="/assets/mobile-DB61is62.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/preload-helper-B--W30Oa.js">
  <link rel="modulepreload" crossorigin href="/assets/dist-CeAEgxSN.js">
  <link rel="modulepreload" crossorigin href="/assets/definitions-B-my8oJV.js">
  <link rel="modulepreload" crossorigin href="/assets/rolldown-runtime-WNZMJCWm.js">
  <link rel="modulepreload" crossorigin href="/assets/api-CS2gjh7X.js">
  <link rel="modulepreload" crossorigin href="/assets/pdf-j8MtzxAL.js">
  <link rel="stylesheet" crossorigin href="/assets/mobile-Diy7PIII.css">
</head>
<body>

  <!-- PANTALLA DE LOGIN MÓVIL -->
  <div id="mobile-login" class="mobile-screen active">
    <div class="login-container">
      <div class="logo-icon"><img src="/logo.png" alt="Logo Municipalidad" style="width: 72px; height: 72px; object-fit: contain; margin-bottom: 16px;"></div>
      <h1>SGTI Móvil</h1>
      <p>Gestión Territorial en Campo</p>
      <form id="mobile-login-form">
        <div class="input-group">
          <label>Usuario</label>
          <input type="text" id="m-user" required autocomplete="username">
        </div>
        <div class="input-group">
          <label>Contraseña</label>
          <input type="password" id="m-pass" required autocomplete="current-password">
        </div>
        <div id="m-login-error" class="error-msg"></div>
        <button type="submit" class="btn-primary" id="m-btn-login">Ingresar</button>
      </form>
    </div>
  </div>

  <!-- PANTALLA PRINCIPAL (APP) -->
  <div id="mobile-app" class="mobile-screen">
    <!-- Header -->
    <header class="mobile-header">
      <div class="header-content">
        <h2 id="header-title">Novedades</h2>
        <span id="user-badge" class="badge"></span>
      </div>
    </header>

    <!-- Contenido Scrollable -->
    <main id="mobile-content">
      
      <!-- VISTA: FEED -->
      <div id="m-view-feed" class="m-view active">
        <div class="feed-controls">
          <select id="m-group-select" class="m-select">
            <option value="municipal">🏢 Gerencia Municipal</option>
            <option value="seguridad">👮 Seguridad Ciudadana</option>
            <option value="ambiental">🍃 Desarrollo Ambiental</option>
            <option value="rentas">💰 Rentas</option>
            <option value="urbano">🏗️ Desarrollo Urbano</option>
            <option value="humano">👥 Desarrollo Humano</option>
            <option value="participacion">🤝 Participación Vecinal</option>
          </select>
          <button class="btn-icon" id="btn-refresh-feed">🔄</button>
        </div>
        <div id="m-feed-container" class="feed">
          <div class="spinner-container"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- VISTA: REPORTES -->
      <div id="m-view-reports" class="m-view">
        <div class="card" style="padding: 24px; text-align: center;">
          <div class="icon-circle" style="background: rgba(79, 143, 247, 0.1); color: var(--blue); margin: 0 auto 16px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 32px; height: 32px;"><path d="M14 3v4a1 1 0 001 1h4M14 3H7a2 2 0 00-2 2v14a2 2 0 002 2h10a2 2 0 002-2V7l-5-4z"/><path d="M12 11v6M9 14l3 3 3-3"/></svg>
          </div>
          <h2 style="font-size: 20px; margin-bottom: 8px;">Informe Semanal</h2>
          <p style="color: var(--text-dim); margin-bottom: 24px;">Genera un informe PDF con las incidencias y KPIs de la gerencia para la semana actual.</p>
          
          <div id="weekly-period-display" style="background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; margin-bottom: 24px; font-size: 14px; border: 1px solid rgba(255,255,255,0.1);">
            <div style="font-size: 10px; color: var(--blue); font-weight: 700; margin-bottom: 4px; text-transform: uppercase;">Periodo de Gestión</div>
            <div id="week-range-text">Cargando semana...</div>
          </div>

          <button class="btn btn-primary" style="width: 100%; height: 52px; font-weight: 600;" onclick="generateMobileReport()">
            Generar Informe Instantáneo
          </button>
        </div>
      </div>

      <!-- VISTA: EQUIPO (SOLO GERENTES) -->
      <div id="m-view-equipo" class="m-view">
        <div class="card" style="padding: 16px;">
          <h3 style="margin-bottom:12px; font-size:16px">Registrar Operador</h3>
          <div id="m-eq-msg" style="margin-bottom:10px; font-size:12px;"></div>
          <div class="input-group">
            <label style="font-size:11px">Nombre Completo</label>
            <input type="text" id="m-eq-nombre" placeholder="Ej: Juan Pérez">
          </div>
          <div class="input-group">
            <label style="font-size:11px">Usuario (App)</label>
            <input type="text" id="m-eq-user" placeholder="Ej: jperez">
          </div>
          <div class="input-group">
            <label style="font-size:11px">Contraseña</label>
            <input type="password" id="m-eq-pass" placeholder="******">
          </div>
          <button class="btn btn-primary" style="width:100%; height:48px; margin-top:10px" onclick="createMobileUser()">
            Crear y Activar Operador
          </button>
        </div>
      </div>

      <!-- VISTA: PERFIL -->
      <div id="m-view-profile" class="m-view">
        <div class="profile-card">
          <div class="avatar" id="p-avatar">U</div>
          <h3 id="p-name">Nombre de Usuario</h3>
          <p id="p-role">Rol</p>
          <button class="btn-outline-danger" id="btn-logout" style="margin-top: 20px; width: 100%;">Cerrar Sesión</button>
        </div>
      </div>

    </main>

    <!-- Navegación Inferior (Bottom Nav) -->
    <nav class="bottom-nav">
      <div class="nav-btn active" id="m-nav-feed" data-target="m-view-feed">
        <div class="icon">📡</div>
        <span>Feed</span>
      </div>
      <div class="nav-btn" id="m-nav-equipo" data-target="m-view-equipo" style="display:none">
        <div class="icon">👥</div>
        <span>Equipo</span>
      </div>
      <div class="nav-btn" id="m-nav-reports" data-target="m-view-reports">
        <div class="icon">📊</div>
        <span>Informe</span>
      </div>
      <div class="nav-btn" data-target="m-view-profile">
        <div class="icon">⚙️</div>
        <span>Perfil</span>
      </div>
    </nav>
  </div>

</body>
</html>
